name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Check formatting with black
        run: black --check --target-version py311 .

      - name: Lint with flake8
        run: flake8 src/ setup/ deploy/ pipeline.py --max-line-length 99

      - name: Run tests
        env:
          # Tests that require Azure credentials are skipped in CI
          # Only structural / unit tests run here
          SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
          WORKSPACE_NAME: ${{ secrets.WORKSPACE_NAME }}
        run: pytest tests/ -v --ignore=tests/test_auth.py
